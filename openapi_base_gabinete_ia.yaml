openapi: 3.0.3
info:
  title: GABINETE IA API
  version: 1.0.0
  description: >-
    Contrato base OpenAPI/Swagger do sistema GESTÃO DE MANDATOS / GABINETE IA.
    API REST versionada para operação web e mobile.
servers:
  - url: /api/v1
    description: Base URL v1

tags:
  - name: Auth
  - name: Administração
  - name: Territórios
  - name: Organizações
  - name: Lideranças
  - name: Contatos
  - name: Consentimentos
  - name: Demandas
  - name: Agenda
  - name: Visitas de Campo
  - name: Jurídico
  - name: Administrativo
  - name: Projetos
  - name: Territorial
  - name: Relatórios
  - name: Uploads
  - name: Mobile Sync
  - name: IA Assistiva

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Autenticar usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login efetuado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Encerrar sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout efetuado
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Retornar contexto do usuário autenticado
      responses:
        '200':
          description: Contexto do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /usuarios:
    get:
      tags: [Administração]
      summary: Listar usuários
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: perfil
          in: query
          schema:
            $ref: '#/components/schemas/PerfilUsuario'
        - name: equipe_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de usuários
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Administração]
      summary: Criar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /usuarios/{usuario_id}:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    get:
      tags: [Administração]
      summary: Obter usuário por ID
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Administração]
      summary: Atualizar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /usuarios/{usuario_id}/status:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    patch:
      tags: [Administração]
      summary: Alterar status do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStatusPatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatusPatchResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /usuarios/{usuario_id}/reset-senha:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    post:
      tags: [Administração]
      summary: Solicitar redefinição de senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '202':
          description: Reset enfileirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'

  /equipes:
    get:
      tags: [Administração]
      summary: Listar equipes
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de equipes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
    post:
      tags: [Administração]
      summary: Criar equipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
      responses:
        '201':
          description: Equipe criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'

  /equipes/{equipe_id}:
    parameters:
      - $ref: '#/components/parameters/EquipeId'
    get:
      tags: [Administração]
      summary: Obter equipe por ID
      responses:
        '200':
          description: Equipe encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Administração]
      summary: Atualizar equipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamUpdateRequest'
      responses:
        '200':
          description: Equipe atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /auditoria:
    get:
      tags: [Administração]
      summary: Listar eventos de auditoria
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: usuario_id
          in: query
          schema:
            type: string
            format: uuid
        - name: entidade
          in: query
          schema:
            type: string
        - name: acao
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'

  /territorios/tree:
    get:
      tags: [Territórios]
      summary: Retornar árvore territorial
      responses:
        '200':
          description: Árvore territorial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritoryTreeResponse'

  /territorios:
    get:
      tags: [Territórios]
      summary: Listar territórios
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: tipo
          in: query
          schema:
            $ref: '#/components/schemas/TipoTerritorio'
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de territórios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritoryListResponse'
    post:
      tags: [Territórios]
      summary: Criar território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerritoryCreateRequest'
      responses:
        '201':
          description: Território criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /territorios/{territorio_id}:
    parameters:
      - $ref: '#/components/parameters/TerritorioId'
    get:
      tags: [Territórios]
      summary: Obter território por ID
      responses:
        '200':
          description: Território encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Territórios]
      summary: Atualizar território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerritoryUpdateRequest'
      responses:
        '200':
          description: Território atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /territorios/{territorio_id}/status:
    parameters:
      - $ref: '#/components/parameters/TerritorioId'
    patch:
      tags: [Territórios]
      summary: Alterar status do território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivePatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'

  /organizacoes:
    get:
      tags: [Organizações]
      summary: Listar organizações
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: tipo
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista de organizações
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
    post:
      tags: [Organizações]
      summary: Criar organização
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        '201':
          description: Organização criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSingleResponse'

  /organizacoes/{organizacao_id}:
    parameters:
      - $ref: '#/components/parameters/OrganizacaoId'
    get:
      tags: [Organizações]
      summary: Obter organização por ID
      responses:
        '200':
          description: Organização encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Organizações]
      summary: Atualizar organização
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        '200':
          description: Organização atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSingleResponse'

  /liderancas:
    get:
      tags: [Lideranças]
      summary: Listar lideranças comunitárias
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de lideranças
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadershipListResponse'
    post:
      tags: [Lideranças]
      summary: Criar liderança comunitária
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadershipCreateRequest'
      responses:
        '201':
          description: Liderança criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadershipSingleResponse'

  /liderancas/{lideranca_id}:
    parameters:
      - $ref: '#/components/parameters/LiderancaId'
    get:
      tags: [Lideranças]
      summary: Obter liderança por ID
      responses:
        '200':
          description: Liderança encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadershipSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Lideranças]
      summary: Atualizar liderança comunitária
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadershipUpdateRequest'
      responses:
        '200':
          description: Liderança atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadershipSingleResponse'

  /contatos:
    get:
      tags: [Contatos]
      summary: Listar contatos/cidadãos
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusContato'
        - name: tipo_contato
          in: query
          schema:
            type: string
        - name: duplicidade_suspeita
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de contatos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
    post:
      tags: [Contatos]
      summary: Criar contato/cidadão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '201':
          description: Contato criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSingleResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /contatos/{contato_id}:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Contatos]
      summary: Obter contato por ID
      responses:
        '200':
          description: Contato encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Contatos]
      summary: Atualizar contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdateRequest'
      responses:
        '200':
          description: Contato atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDetailResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /contatos/{contato_id}/status:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    patch:
      tags: [Contatos]
      summary: Alterar status do contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactStatusPatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSingleResponse'

  /contatos/{contato_id}/demandas:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Contatos]
      summary: Listar demandas do contato
      responses:
        '200':
          description: Demandas do contato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandListResponse'

  /contatos/{contato_id}/agenda:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Contatos]
      summary: Listar agenda vinculada ao contato
      responses:
        '200':
          description: Agenda do contato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaEventListResponse'

  /contatos/{contato_id}/documentos:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Contatos]
      summary: Listar documentos vinculados ao contato
      responses:
        '200':
          description: Documentos vinculados ao contato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalDocumentListResponse'

  /contatos/duplicidades:
    get:
      tags: [Contatos]
      summary: Listar duplicidades suspeitas de contatos
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grupos de duplicidade suspeita
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDuplicateGroupsResponse'

  /contatos/{contato_id}/consentimentos:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Consentimentos]
      summary: Listar consentimentos do contato
      responses:
        '200':
          description: Consentimentos do contato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentListResponse'
    post:
      tags: [Consentimentos]
      summary: Criar consentimento para contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentCreateRequest'
      responses:
        '201':
          description: Consentimento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentSingleResponse'

  /demandas:
    get:
      tags: [Demandas]
      summary: Listar demandas
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusDemanda'
        - name: prioridade
          in: query
          schema:
            $ref: '#/components/schemas/PrioridadeDemanda'
        - name: categoria_id
          in: query
          schema:
            type: string
            format: uuid
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: responsavel_usuario_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista paginada de demandas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandListResponse'
    post:
      tags: [Demandas]
      summary: Criar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandCreateRequest'
      responses:
        '201':
          description: Demanda criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /demandas/{demanda_id}:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    get:
      tags: [Demandas]
      summary: Obter demanda por ID
      responses:
        '200':
          description: Demanda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Demandas]
      summary: Atualizar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandUpdateRequest'
      responses:
        '200':
          description: Demanda atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandDetailResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /demandas/{demanda_id}/assumir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      summary: Assumir demanda
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Demanda assumida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/atribuir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      summary: Atribuir demanda a responsável
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandAssignRequest'
      responses:
        '200':
          description: Demanda atribuída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /demandas/{demanda_id}/repriorizar:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      summary: Repriorizar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandReprioritizeRequest'
      responses:
        '200':
          description: Demanda repriorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/encaminhar:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      summary: Encaminhar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForwardRequest'
      responses:
        '201':
          description: Encaminhamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardSingleResponse'

  /demandas/{demanda_id}/concluir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      summary: Concluir demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcludeDemandRequest'
      responses:
        '200':
          description: Demanda concluída
