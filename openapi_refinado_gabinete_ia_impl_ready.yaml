openapi: 3.0.3
info:
  title: GABINETE IA API
  version: 1.1.0
  description: >-
    Contrato OpenAPI refinado do sistema GESTÃO DE MANDATOS / GABINETE IA.
    Estruturado para codegen, implementação backend FastAPI e consumo por frontend web/mobile.
servers:
  - url: /api/v1
    description: API versionada v1

tags:
  - name: Auth
    description: Autenticação e contexto do usuário
  - name: Administração
    description: Usuários, equipes e auditoria
  - name: Territórios
    description: Estrutura territorial do gabinete
  - name: Contatos
    description: Cadastros de cidadãos e contatos institucionais
  - name: Consentimentos
    description: Consentimentos e canais de contato
  - name: Demandas
    description: Atendimento institucional e triagem
  - name: Agenda
    description: Agenda operacional e executiva
  - name: Jurídico
    description: Documentos jurídicos e versionamento
  - name: Administrativo
    description: Protocolos, tarefas e checklists
  - name: Projetos
    description: Projetos do mandato, etapas e riscos
  - name: Territorial
    description: Indicadores e eventos territoriais agregados
  - name: Relatórios
    description: Relatórios operacionais e executivos
  - name: Uploads
    description: Upload e metadados de arquivos
  - name: Mobile Sync
    description: Sincronização idempotente do aplicativo mobile
  - name: IA Assistiva
    description: Recursos assistivos de IA com revisão humana

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Autenticar usuário
      description: >-
        Autentica o usuário e retorna access token, refresh token,
        contexto do usuário e escopos aplicáveis.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email_login: usuario@gabinete.com
                  senha: Senha@123
      responses:
        '200':
          description: Login efetuado com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Renovar access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token renovado
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Encerrar sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout efetuado
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Obter contexto do usuário autenticado
      responses:
        '200':
          description: Contexto do usuário retornado com sucesso
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /usuarios:
    get:
      tags: [Administração]
      operationId: listUsers
      summary: Listar usuários
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: perfil
          in: query
          schema:
            $ref: '#/components/schemas/PerfilUsuario'
        - name: equipe_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de usuários
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      tags: [Administração]
      operationId: createUser
      summary: Criar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuário criado com sucesso
          headers:
            Location:
              description: URL do recurso criado
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /usuarios/{usuario_id}:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    get:
      tags: [Administração]
      operationId: getUserById
      summary: Obter usuário por ID
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Administração]
      operationId: updateUser
      summary: Atualizar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSingleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /usuarios/{usuario_id}/status:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    patch:
      tags: [Administração]
      operationId: patchUserStatus
      summary: Alterar status do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserStatusPatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatusPatchResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /usuarios/{usuario_id}/reset-senha:
    parameters:
      - $ref: '#/components/parameters/UsuarioId'
    post:
      tags: [Administração]
      operationId: requestUserPasswordReset
      summary: Solicitar redefinição de senha
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '202':
          description: Reset enfileirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'

  /equipes:
    get:
      tags: [Administração]
      operationId: listTeams
      summary: Listar equipes
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de equipes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
    post:
      tags: [Administração]
      operationId: createTeam
      summary: Criar equipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
      responses:
        '201':
          description: Equipe criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'

  /equipes/{equipe_id}:
    parameters:
      - $ref: '#/components/parameters/EquipeId'
    get:
      tags: [Administração]
      operationId: getTeamById
      summary: Obter equipe por ID
      responses:
        '200':
          description: Equipe encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Administração]
      operationId: updateTeam
      summary: Atualizar equipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamUpdateRequest'
      responses:
        '200':
          description: Equipe atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamSingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /auditoria:
    get:
      tags: [Administração]
      operationId: listAuditEvents
      summary: Listar eventos de auditoria
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: usuario_id
          in: query
          schema:
            type: string
            format: uuid
        - name: entidade
          in: query
          schema:
            type: string
        - name: acao
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'

  /territorios/tree:
    get:
      tags: [Territórios]
      operationId: getTerritoryTree
      summary: Retornar árvore territorial
      responses:
        '200':
          description: Árvore territorial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritoryTreeResponse'

  /territorios:
    get:
      tags: [Territórios]
      operationId: listTerritories
      summary: Listar territórios
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: tipo
          in: query
          schema:
            $ref: '#/components/schemas/TipoTerritorio'
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de territórios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritoryListResponse'
    post:
      tags: [Territórios]
      operationId: createTerritory
      summary: Criar território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerritoryCreateRequest'
      responses:
        '201':
          description: Território criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /territorios/{territorio_id}:
    parameters:
      - $ref: '#/components/parameters/TerritorioId'
    get:
      tags: [Territórios]
      operationId: getTerritoryById
      summary: Obter território por ID
      responses:
        '200':
          description: Território encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Territórios]
      operationId: updateTerritory
      summary: Atualizar território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerritoryUpdateRequest'
      responses:
        '200':
          description: Território atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /territorios/{territorio_id}/status:
    parameters:
      - $ref: '#/components/parameters/TerritorioId'
    patch:
      tags: [Territórios]
      operationId: patchTerritoryStatus
      summary: Alterar status do território
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivePatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerritorySingleResponse'

  /contatos:
    get:
      tags: [Contatos]
      operationId: listContacts
      summary: Listar contatos
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortOrder'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusContato'
        - name: tipo_contato
          in: query
          schema:
            type: string
        - name: duplicidade_suspeita
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de contatos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactListResponse'
    post:
      tags: [Contatos]
      operationId: createContact
      summary: Criar contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreateRequest'
      responses:
        '201':
          description: Contato criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSingleResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /contatos/{contato_id}:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Contatos]
      operationId: getContactById
      summary: Obter contato por ID
      responses:
        '200':
          description: Contato encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Contatos]
      operationId: updateContact
      summary: Atualizar contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdateRequest'
      responses:
        '200':
          description: Contato atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactDetailResponse'
        '409':
          $ref: '#/components/responses/ConflictError'

  /contatos/{contato_id}/status:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    patch:
      tags: [Contatos]
      operationId: patchContactStatus
      summary: Alterar status do contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactStatusPatchRequest'
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSingleResponse'

  /contatos/{contato_id}/consentimentos:
    parameters:
      - $ref: '#/components/parameters/ContatoId'
    get:
      tags: [Consentimentos]
      operationId: listContactConsents
      summary: Listar consentimentos do contato
      responses:
        '200':
          description: Lista de consentimentos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentListResponse'
    post:
      tags: [Consentimentos]
      operationId: createContactConsent
      summary: Criar consentimento do contato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentCreateRequest'
      responses:
        '201':
          description: Consentimento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentSingleResponse'

  /demandas:
    get:
      tags: [Demandas]
      operationId: listDemands
      summary: Listar demandas
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusDemanda'
        - name: prioridade
          in: query
          schema:
            $ref: '#/components/schemas/PrioridadeDemanda'
        - name: categoria_id
          in: query
          schema:
            type: string
            format: uuid
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: responsavel_usuario_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista paginada de demandas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandListResponse'
    post:
      tags: [Demandas]
      operationId: createDemand
      summary: Criar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandCreateRequest'
      responses:
        '201':
          description: Demanda criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    get:
      tags: [Demandas]
      operationId: getDemandById
      summary: Obter demanda por ID
      responses:
        '200':
          description: Demanda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandDetailResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Demandas]
      operationId: updateDemand
      summary: Atualizar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandUpdateRequest'
      responses:
        '200':
          description: Demanda atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandDetailResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /demandas/{demanda_id}/assumir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: takeDemandOwnership
      summary: Assumir demanda
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Demanda assumida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/atribuir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: assignDemand
      summary: Atribuir demanda a responsável
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandAssignRequest'
      responses:
        '200':
          description: Demanda atribuída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/repriorizar:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: reprioritizeDemand
      summary: Repriorizar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandReprioritizeRequest'
      responses:
        '200':
          description: Demanda repriorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/encaminhar:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: forwardDemand
      summary: Encaminhar demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForwardRequest'
      responses:
        '201':
          description: Encaminhamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForwardSingleResponse'

  /demandas/{demanda_id}/concluir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: concludeDemand
      summary: Concluir demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcludeDemandRequest'
      responses:
        '200':
          description: Demanda concluída
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'

  /demandas/{demanda_id}/reabrir:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    post:
      tags: [Demandas]
      operationId: reopenDemand
      summary: Reabrir demanda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReopenDemandRequest'
      responses:
        '200':
          description: Demanda reaberta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandSingleResponse'
        '422':
          $ref: '#/components/responses/BusinessRuleError'

  /demandas/{demanda_id}/historico:
    parameters:
      - $ref: '#/components/parameters/DemandaId'
    get:
      tags: [Demandas]
      operationId: listDemandHistory
      summary: Listar histórico da demanda
      responses:
        '200':
          description: Histórico da demanda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandHistoryListResponse'

  /agenda:
    get:
      tags: [Agenda]
      operationId: listAgendaEvents
      summary: Listar eventos de agenda
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: tipo_agenda_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/StatusAgenda'
        - name: territorio_id
          in: query
          schema:
            type: string
            format: uuid
        - name: responsavel_usuario_id
          in: query
          schema:
            type: string
            format: uuid
        - name: eh_agenda_vereador
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de eventos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaEventListResponse'

  /agenda-eventos:
    post:
      tags: [Agenda]
      operationId: createAgendaEvent
      summary: Criar evento de agenda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaEventCreateRequest'
      responses:
        '201':
          description: Evento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaEventSingleResponse'

  /agenda-eventos/{evento_id}:
    parameters:
      - $ref: '#/components/parameters/EventoId'
    get:
      tags: [Agenda]
      operationId: getAgendaEventById
