components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      description: Identificador único da requisição
      schema:
        type: string
        format: uuid

  parameters:
    Search:
      name: search
      in: query
      schema:
        type: string
      description: Busca textual simples
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortBy:
      name: sort_by
      in: query
      schema:
        type: string
        default: created_at
    SortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    DateFrom:
      name: date_from
      in: query
      schema:
        type: string
        format: date-time
    DateTo:
      name: date_to
      in: query
      schema:
        type: string
        format: date-time
    UsuarioId:
      name: usuario_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EquipeId:
      name: equipe_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TerritorioId:
      name: territorio_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContatoId:
      name: contato_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DemandaId:
      name: demanda_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventoId:
      name: evento_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentoId:
      name: documento_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProtocoloId:
      name: protocolo_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TarefaId:
      name: tarefa_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChecklistId:
      name: checklist_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjetoId:
      name: projeto_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EtapaId:
      name: etapa_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizacaoId:
      name: organizacao_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LiderancaId:
      name: lideranca_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VisitaId:
      name: visita_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    UnauthorizedError:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Token ausente ou inválido.
            meta:
              request_id: 00000000-0000-0000-0000-000000000000
              timestamp: '2026-04-16T10:00:00Z'
    ForbiddenError:
      description: Sem permissão
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflito de recurso ou duplicidade
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessRuleError:
      description: Regra de negócio violada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    PerfilUsuario:
      type: string
      enum: [COLABORADOR_EXTERNO, SUPERVISOR_EQUIPE, ASSESSOR_NIVEL_1, ASSESSOR_JURIDICO, ASSESSOR_ADMINISTRATIVO, CHEFE_GABINETE, VEREADOR]
    StatusContato:
      type: string
      enum: [ATIVO, INATIVO, PENDENTE_VALIDACAO, DUPLICIDADE_SUSPEITA]
    StatusDemanda:
      type: string
      enum: [ABERTA, EM_TRIAGEM, EM_ATENDIMENTO, ENCAMINHADA, AGUARDANDO_RETORNO, CONCLUIDA, SUSPENSA, CANCELADA, REABERTA]
    PrioridadeDemanda:
      type: string
      enum: [BAIXA, MEDIA, ALTA, CRITICA]
    StatusVisita:
      type: string
      enum: [PLANEJADA, REALIZADA, NAO_REALIZADA, REAGENDADA, CANCELADA]
    StatusAgenda:
      type: string
      enum: [PLANEJADO, CONFIRMADO, EM_ANDAMENTO, REALIZADO, CANCELADO, REAGENDADO]
    StatusTarefa:
      type: string
      enum: [ABERTA, EM_EXECUCAO, BLOQUEADA, CONCLUIDA, CANCELADA]
    StatusDocumento:
      type: string
      enum: [RASCUNHO, EM_ELABORACAO, EM_REVISAO, APROVADO, PROTOCOLADO, ARQUIVADO, CANCELADO]
    TipoDocumento:
      type: string
      enum: [PARECER, REQUERIMENTO, OFICIO, MINUTA, ANEXO_OPERACIONAL, OUTRO]
    StatusProtocolo:
      type: string
      enum: [REGISTRADO, EM_TRAMITACAO, PENDENTE, CONCLUIDO, ARQUIVADO]
    StatusProjeto:
      type: string
      enum: [PLANEJADO, EM_ANDAMENTO, PAUSADO, CONCLUIDO, CANCELADO]
    NivelRisco:
      type: string
      enum: [BAIXO, MEDIO, ALTO, CRITICO]
    TipoTerritorio:
      type: string
      enum: [REGIAO, BAIRRO, MICROAREA]
    OrigemCadastro:
      type: string
      enum: [MOBILE_CAMPO, WEB_INTERNO, IMPORTACAO, INTEGRACAO]
    CanalContato:
      type: string
      enum: [TELEFONE, WHATSAPP, EMAIL, OUTRO]
    TipoEncaminhamento:
      type: string
      enum: [INTERNO, JURIDICO, ADMINISTRATIVO, EXTERNO]

    Meta:
      type: object
      required: [request_id, timestamp]
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time

    PaginationMeta:
      allOf:
        - $ref: '#/components/schemas/Meta'
        - type: object
          required: [page, page_size, total, total_pages]
          properties:
            page:
              type: integer
            page_size:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'

    ScopeInput:
      type: object
      required: [escopo_tipo]
      properties:
        escopo_tipo:
          type: string
        territorio_id:
          type: string
          format: uuid
          nullable: true
        equipe_id:
          type: string
          format: uuid
          nullable: true
        escopo_valor:
          type: string
          nullable: true

    ScopeOutput:
      allOf:
        - $ref: '#/components/schemas/ScopeInput'
        - type: object
          properties:
            id:
              type: string
              format: uuid

    LoginRequest:
      type: object
      required: [email_login, senha]
      properties:
        email_login:
          type: string
          format: email
        senha:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenBundle:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer

    UserSummary:
      type: object
      required: [id, nome, perfil, gabinete_id]
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        perfil:
          $ref: '#/components/schemas/PerfilUsuario'
        gabinete_id:
          type: string
          format: uuid
        equipe_id:
          type: string
          format: uuid
          nullable: true
        ativo:
          type: boolean
        escopos:
          type: array
          items:
            $ref: '#/components/schemas/ScopeOutput'

    LoginResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/TokenBundle'
            - type: object
              properties:
                user:
                  $ref: '#/components/schemas/UserSummary'
        meta:
          $ref: '#/components/schemas/Meta'

    RefreshTokenResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TokenBundle'
        meta:
          $ref: '#/components/schemas/Meta'

    MeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UserSummary'
        meta:
          $ref: '#/components/schemas/Meta'

    UserBase:
      type: object
      properties:
        nome:
          type: string
        email_login:
          type: string
          format: email
        telefone:
          type: string
          nullable: true
        perfil:
          $ref: '#/components/schemas/PerfilUsuario'
        equipe_id:
          type: string
          format: uuid
          nullable: true
        ativo:
          type: boolean

    UserCreateRequest:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          required: [nome, email_login, perfil]
          properties:
            escopos:
              type: array
              items:
                $ref: '#/components/schemas/ScopeInput'

    UserUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/UserBase'
        - type: object
          properties:
            escopos:
              type: array
              items:
                $ref: '#/components/schemas/ScopeInput'

    UserItem:
